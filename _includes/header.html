<a class="skip-link" href="#contenido">Saltar al contenido</a>
<header class="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}, inicio">
      <span class="brand-logo" aria-hidden="true">
        <span class="brand-frame"></span>
        <span class="brand-letters"><b>M</b><b>F</b><b>M</b><b>P</b></span>
        <span class="brand-subtitle">Docencia</span>
      </span>
    </a>
    <nav aria-label="Navegación principal">
      <ul class="site-nav">
        {% for item in site.data.navigation %}
          {% assign item_url = item.url | relative_url %}
          <li>
            <a href="{{ item_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.label }}</a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
