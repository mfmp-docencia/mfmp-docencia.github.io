<!DOCTYPE html>
<html lang="{{ site.lang | default: 'es' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Poppins:wght@600;700;800&amp;display=swap" rel="stylesheet">
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem('mfmp-theme');
        var preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = savedTheme || preferredTheme;
      } catch (error) {
        document.documentElement.dataset.theme = 'light';
      }
    }());
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
</head>
<body>
  {% include header.html %}
  <main id="contenido" class="site-main">
    {{ content }}
  </main>
  {% include footer.html %}
</body>
</html>
